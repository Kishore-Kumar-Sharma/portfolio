<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t5">
  <title id="t5">Metric-first development</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .stage{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .accStage{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .big{fill:#6028d9;font-family:Fraunces,Georgia,serif;font-size:26px;font-style:italic;font-weight:500}
    .small{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px}
    .ft{fill:#1a1a24}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .smSolid{stroke:#b3b3bd;fill:none;stroke-width:1}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    @media (prefers-color-scheme: dark){
      .text,.ft{fill:#e8e4d8}
      .label,.stage{fill:#9c9ca6}.accStage,.big,.small{fill:#b89be8}
      .s{stroke:#e8e4d8}.sm,.smSolid{stroke:#4a4a55}.a{stroke:#b89be8}
    }
  </style>

  <text x="40" y="40" class="label">DISCIPLINE OF MEASURING BEFORE YOU SHIP</text>

  <rect x="60" y="100" width="160" height="120" rx="4" class="a"/>
  <text x="140" y="130" text-anchor="middle" class="accStage">01 · METRIC</text>
  <text x="140" y="160" text-anchor="middle" class="text">throughput</text>
  <text x="140" y="195" text-anchor="middle" class="big">+30%</text>

  <line x1="225" y1="160" x2="295" y2="160" class="s"/>
  <polygon points="295,160 285,155 285,165" class="ft"/>

  <rect x="300" y="100" width="160" height="120" rx="4" class="s"/>
  <text x="380" y="130" text-anchor="middle" class="stage">02 · CODE</text>
  <line x1="320" y1="155" x2="430" y2="155" class="smSolid"/>
  <line x1="320" y1="170" x2="410" y2="170" class="smSolid"/>
  <line x1="320" y1="185" x2="425" y2="185" class="smSolid"/>
  <line x1="320" y1="200" x2="395" y2="200" class="smSolid"/>

  <line x1="465" y1="160" x2="535" y2="160" class="s"/>
  <polygon points="535,160 525,155 525,165" class="ft"/>

  <rect x="540" y="100" width="180" height="120" rx="4" class="s"/>
  <text x="630" y="130" text-anchor="middle" class="stage">03 · MEASURE</text>
  <line x1="555" y1="200" x2="710" y2="200" class="sm"/>
  <polyline points="555,200 580,188 605,178 630,166 655,152 685,140" class="a"/>
  <text x="690" y="155" class="small">+34%</text>

  <text x="400" y="280" text-anchor="middle" class="label">IF YOU CAN&apos;T NAME THE METRIC, YOU DON&apos;T UNDERSTAND THE WORK YET</text>
</svg>
