<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1">
  <title id="t1">Service contract vs shared internal module</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25;stroke-dasharray:5 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .ft{fill:#1a1a24}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.dg{stroke:#d97a7a}.a{stroke:#b89be8}
      .fa{fill:#b89be8}.ft{fill:#e8e4d8}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="42" class="label">01 — WITHOUT CONTRACT</text>
  <rect x="60" y="80" width="130" height="56" rx="4" class="s"/>
  <text x="125" y="113" text-anchor="middle" class="mono">service a</text>
  <rect x="610" y="80" width="130" height="56" rx="4" class="s"/>
  <text x="675" y="113" text-anchor="middle" class="mono">service b</text>
  <ellipse cx="400" cy="108" rx="200" ry="32" class="dg"/>
  <text x="400" y="113" text-anchor="middle" class="text">shared internal module</text>
  <text x="400" y="172" text-anchor="middle" class="danger">CHANGE PROPAGATES SILENTLY · PRODUCER CAN YANK</text>

  <line x1="40" y1="220" x2="760" y2="220" class="sm"/>

  <text x="40" y="262" class="label">02 — WITH CONTRACT</text>
  <rect x="60" y="300" width="130" height="56" rx="4" class="s"/>
  <text x="125" y="333" text-anchor="middle" class="mono">service a</text>
  <rect x="610" y="300" width="130" height="56" rx="4" class="s"/>
  <text x="675" y="333" text-anchor="middle" class="mono">service b</text>
  <line x1="190" y1="328" x2="612" y2="328" class="a"/>
  <polygon points="612,328 602,323 602,333" class="fa"/>
  <rect x="340" y="313" width="120" height="30" rx="3" class="fs"/>
  <rect x="340" y="313" width="120" height="30" rx="3" class="a"/>
  <text x="400" y="333" text-anchor="middle" class="acc">openapi · v1</text>
  <text x="400" y="395" text-anchor="middle" class="label">CONSUMER PINS · BREAKING CHANGE = /v2 · NEVER A SAME-VERSION MUTATION</text>
</svg>
