<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t2">
  <title id="t2">Idempotency via a request-id cache</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .ft{fill:#1a1a24}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.ft{fill:#e8e4d8}
    }
  </style>

  <text x="40" y="36" class="label">REQUEST-ID DEDUPE</text>

  <rect x="60" y="62" width="120" height="36" rx="3" class="s"/>
  <text x="120" y="86" text-anchor="middle" class="mono">client</text>
  <line x1="120" y1="98" x2="120" y2="380" class="sm"/>

  <rect x="640" y="62" width="120" height="36" rx="3" class="s"/>
  <text x="700" y="86" text-anchor="middle" class="mono">server</text>
  <line x1="700" y1="98" x2="700" y2="380" class="sm"/>

  <line x1="120" y1="148" x2="700" y2="148" class="a"/>
  <polygon points="700,148 690,143 690,153" class="fa"/>
  <text x="410" y="140" text-anchor="middle" class="acc">POST /charge · x-request-id: 7a3f</text>

  <rect x="690" y="158" width="20" height="32" class="a"/>
  <text x="680" y="180" text-anchor="end" class="label">PROCESS · CACHE BY ID</text>

  <line x1="700" y1="200" x2="120" y2="200" class="s"/>
  <polygon points="120,200 130,195 130,205" class="ft"/>
  <text x="410" y="218" text-anchor="middle" class="label">200 OK · charge_id: c_91x</text>

  <text x="120" y="252" text-anchor="middle" class="danger">×× NETWORK BLIP — RESPONSE LOST</text>

  <line x1="120" y1="288" x2="700" y2="288" class="a" stroke-dasharray="4 3"/>
  <polygon points="700,288 690,283 690,293" class="fa"/>
  <text x="410" y="280" text-anchor="middle" class="acc">RETRY · same x-request-id: 7a3f</text>

  <rect x="690" y="298" width="20" height="20" class="a"/>
  <text x="680" y="312" text-anchor="end" class="label">CACHE HIT · NO SIDE EFFECT</text>

  <line x1="700" y1="334" x2="120" y2="334" class="s"/>
  <polygon points="120,334 130,329 130,339" class="ft"/>
  <text x="410" y="352" text-anchor="middle" class="label">200 OK · charge_id: c_91x   (same response)</text>

  <text x="400" y="402" text-anchor="middle" class="label">ONE REDIS KEY SAVES YOU FROM A DUPLICATE CHARGE</text>
</svg>
