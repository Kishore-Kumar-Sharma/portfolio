<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-review">
  <title id="t-review">Three review disciplines that prevent disasters from agent diffs</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">A DIFF FROM AN AGENT IS NOT A DIFF FROM A COLLEAGUE</text>

  <!-- Discipline 1 -->
  <rect x="40" y="64" width="230" height="200" rx="4" class="s"/>
  <text x="60" y="92" class="acc">01 · READ THE FULL DIFF</text>
  <text x="60" y="112" class="label">SKIM ≠ READ</text>
  <line x1="60" y1="124" x2="250" y2="124" class="sm"/>
  <text x="60" y="148" class="text">If the diff is too long</text>
  <text x="60" y="166" class="text">to read in full, the task</text>
  <text x="60" y="184" class="text">was scoped too large.</text>
  <text x="60" y="208" class="acc">→ split and re-run</text>
  <text x="60" y="244" class="label">REVIEW IS THE BOTTLENECK NOW</text>

  <!-- Discipline 2 -->
  <rect x="285" y="64" width="230" height="200" rx="4" class="fs"/>
  <rect x="285" y="64" width="230" height="200" rx="4" class="a"/>
  <text x="305" y="92" class="acc">02 · CHECK THE SILENCE</text>
  <text x="305" y="112" class="label">WHAT THE AGENT DIDN'T CHANGE</text>
  <line x1="305" y1="124" x2="495" y2="124" class="sm"/>
  <text x="305" y="148" class="text">New field, no migration.</text>
  <text x="305" y="166" class="text">New caller, no test.</text>
  <text x="305" y="184" class="text">New flag, no docs.</text>
  <text x="305" y="208" class="danger">SINS OF OMISSION</text>
  <text x="305" y="244" class="label">MOST EXPENSIVE BUG CATEGORY</text>

  <!-- Discipline 3 -->
  <rect x="530" y="64" width="230" height="200" rx="4" class="s"/>
  <text x="550" y="92" class="acc">03 · WALK THE FAILURES</text>
  <text x="550" y="112" class="label">MENTALLY · BEFORE MERGE</text>
  <line x1="550" y1="124" x2="740" y2="124" class="sm"/>
  <text x="550" y="148" class="text">Zero input?</text>
  <text x="550" y="166" class="text">Max input?</text>
  <text x="550" y="184" class="text">Concurrent calls?</text>
  <text x="550" y="208" class="text">Slow upstream?</text>
  <text x="550" y="244" class="label">AGENTS TEST THE HAPPY PATH</text>

  <text x="400" y="304" text-anchor="middle" class="label">DECREASING SCRUTINY AS TRUST BUILDS · NEVER ZERO FOR SECURITY-SENSITIVE</text>
</svg>
