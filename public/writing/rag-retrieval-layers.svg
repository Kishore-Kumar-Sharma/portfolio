<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-rag-retrieve">
  <title id="t-rag-retrieve">Production retrieval: pre-filter, hybrid, rerank, dedupe</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">NAIVE TOP-K COSINE DOESN'T SURVIVE A REAL CORPUS · LAYER UP</text>

  <!-- Query -->
  <rect x="20" y="100" width="100" height="56" rx="4" class="s"/>
  <text x="70" y="124" text-anchor="middle" class="mono">query</text>
  <text x="70" y="142" text-anchor="middle" class="label">+ USER</text>

  <line x1="120" y1="128" x2="150" y2="128" class="a"/>
  <polygon points="150,128 140,123 140,133" class="fa"/>

  <!-- Layer 1: Pre-filter -->
  <rect x="150" y="80" width="130" height="100" rx="4" class="s"/>
  <text x="215" y="106" text-anchor="middle" class="acc">01 · PRE-FILTER</text>
  <text x="215" y="126" text-anchor="middle" class="text">acl + recency</text>
  <text x="215" y="142" text-anchor="middle" class="text">+ team scope</text>
  <text x="215" y="162" text-anchor="middle" class="label">METADATA AT DB</text>

  <line x1="280" y1="128" x2="310" y2="128" class="a"/>
  <polygon points="310,128 300,123 300,133" class="fa"/>

  <!-- Layer 2: Hybrid search -->
  <rect x="310" y="80" width="130" height="100" rx="4" class="s"/>
  <text x="375" y="106" text-anchor="middle" class="acc">02 · HYBRID</text>
  <text x="375" y="126" text-anchor="middle" class="text">bm25 + vector</text>
  <text x="375" y="142" text-anchor="middle" class="text">top 50</text>
  <text x="375" y="162" text-anchor="middle" class="label">SEMANTIC + EXACT</text>

  <line x1="440" y1="128" x2="470" y2="128" class="a"/>
  <polygon points="470,128 460,123 460,133" class="fa"/>

  <!-- Layer 3: Re-rank -->
  <rect x="470" y="80" width="130" height="100" rx="4" class="s"/>
  <text x="535" y="106" text-anchor="middle" class="acc">03 · RE-RANK</text>
  <text x="535" y="126" text-anchor="middle" class="text">cross-encoder</text>
  <text x="535" y="142" text-anchor="middle" class="text">top 50 → 10</text>
  <text x="535" y="162" text-anchor="middle" class="label">SLOWER · BETTER</text>

  <line x1="600" y1="128" x2="630" y2="128" class="a"/>
  <polygon points="630,128 620,123 620,133" class="fa"/>

  <!-- Layer 4: Dedupe -->
  <rect x="630" y="80" width="130" height="100" rx="4" class="fs"/>
  <rect x="630" y="80" width="130" height="100" rx="4" class="a"/>
  <text x="695" y="106" text-anchor="middle" class="acc">04 · DEDUPE</text>
  <text x="695" y="126" text-anchor="middle" class="text">jaccard on text</text>
  <text x="695" y="142" text-anchor="middle" class="text">drop near-dupes</text>
  <text x="695" y="162" text-anchor="middle" class="label">→ TO GENERATOR</text>

  <!-- Failure annotations below -->
  <line x1="40" y1="210" x2="760" y2="210" class="sm"/>
  <text x="40" y="234" class="acc">WHAT EACH LAYER PREVENTS</text>

  <text x="40" y="258" class="text">01 → ACL leaks · stale results · wasted vector work</text>
  <text x="40" y="276" class="text">02 → exact-term misses (product names, error codes, jargon)</text>
  <text x="40" y="294" class="text">03 → relevant chunks buried under high-similarity-but-wrong matches</text>
  <text x="40" y="312" class="text">04 → context window wasted on the same idea repeated three times</text>
</svg>
