<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-llm-fail">
  <title id="t-llm-fail">Five LLM provider failure modes and the right response to each</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">FIVE FAILURE MODES · ONE STRATEGY EACH · DON'T BLANKET-RETRY</text>

  <!-- Column headers -->
  <text x="60" y="74" class="label">FAILURE</text>
  <text x="280" y="74" class="label">CAUSE</text>
  <text x="520" y="74" class="label">RESPONSE</text>

  <!-- Row 1: 429 -->
  <rect x="40" y="86" width="200" height="56" rx="4" class="s"/>
  <text x="60" y="110" class="danger">429 · RATE LIMIT</text>
  <text x="60" y="130" class="label">PROVIDER QUOTA HIT</text>
  <text x="280" y="118" class="text">budget exhausted</text>
  <text x="520" y="110" class="acc">backoff to Retry-After</text>
  <text x="520" y="130" class="label">DON'T BLIND-RETRY</text>

  <!-- Row 2: 5xx -->
  <rect x="40" y="152" width="200" height="56" rx="4" class="s"/>
  <text x="60" y="176" class="danger">5XX · SERVER ERROR</text>
  <text x="60" y="196" class="label">PROVIDER INSTABILITY</text>
  <text x="280" y="184" class="text">transient outage</text>
  <text x="520" y="176" class="acc">retry N with jitter</text>
  <text x="520" y="196" class="label">THEN OPEN CIRCUIT</text>

  <!-- Row 3: timeout -->
  <rect x="40" y="218" width="200" height="56" rx="4" class="s"/>
  <text x="60" y="242" class="danger">TIMEOUT</text>
  <text x="60" y="262" class="label">AMBIGUOUS · SLOW OR HUNG</text>
  <text x="280" y="250" class="text">slow vs still generating</text>
  <text x="520" y="242" class="acc">stream + cap input tokens</text>
  <text x="520" y="262" class="label">STREAM TIMEOUTS ARE REAL</text>

  <!-- Row 4: malformed -->
  <rect x="40" y="284" width="200" height="56" rx="4" class="s"/>
  <text x="60" y="308" class="danger">MALFORMED OUTPUT</text>
  <text x="60" y="328" class="label">JSON SHOULD HAVE BEEN JSON</text>
  <text x="280" y="316" class="text">model returned prose</text>
  <text x="520" y="308" class="acc">retry once stricter · fail</text>
  <text x="520" y="328" class="label">DO NOT LOOP</text>

  <!-- Row 5: filter -->
  <rect x="40" y="350" width="200" height="56" rx="4" class="s"/>
  <text x="60" y="374" class="danger">SAFETY BLOCK</text>
  <text x="60" y="394" class="label">CONTENT REFUSED</text>
  <text x="280" y="382" class="text">policy filter triggered</text>
  <text x="520" y="374" class="acc">distinct error type</text>
  <text x="520" y="394" class="label">NOT RETRYABLE · UI EXPLAINS</text>

  <text x="400" y="430" text-anchor="middle" class="label">FALLBACK MODELS ARE NOT INTERCHANGEABLE · DECIDE PER CAPABILITY</text>
</svg>
