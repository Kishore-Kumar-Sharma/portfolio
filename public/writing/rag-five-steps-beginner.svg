<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-rag-5steps">
  <title id="t-rag-5steps">The five steps of RAG, beginner version</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">FIVE STEPS · FOUR ARE SETUP ONCE · ONE RUNS PER QUESTION</text>

  <!-- "Setup once" header bar -->
  <rect x="20" y="64" width="500" height="22" rx="3" class="s"/>
  <text x="270" y="80" text-anchor="middle" class="acc">SETUP ONCE (DO BEFORE USERS ASK)</text>

  <!-- Step 1: Documents -->
  <rect x="20" y="100" width="115" height="80" rx="4" class="s"/>
  <text x="78" y="124" text-anchor="middle" class="acc">01 · DOCS</text>
  <text x="78" y="146" text-anchor="middle" class="text">your PDFs,</text>
  <text x="78" y="162" text-anchor="middle" class="text">wiki, FAQs</text>

  <line x1="135" y1="140" x2="155" y2="140" class="a"/>
  <polygon points="155,140 145,135 145,145" class="fa"/>

  <!-- Step 2: Chunks -->
  <rect x="155" y="100" width="115" height="80" rx="4" class="s"/>
  <text x="213" y="124" text-anchor="middle" class="acc">02 · CHUNKS</text>
  <text x="213" y="146" text-anchor="middle" class="text">cut into</text>
  <text x="213" y="162" text-anchor="middle" class="text">small pieces</text>

  <line x1="270" y1="140" x2="290" y2="140" class="a"/>
  <polygon points="290,140 280,135 280,145" class="fa"/>

  <!-- Step 3: Embeddings -->
  <rect x="290" y="100" width="115" height="80" rx="4" class="s"/>
  <text x="348" y="124" text-anchor="middle" class="acc">03 · EMBED</text>
  <text x="348" y="146" text-anchor="middle" class="text">turn each into</text>
  <text x="348" y="162" text-anchor="middle" class="text">numbers</text>

  <line x1="405" y1="140" x2="425" y2="140" class="a"/>
  <polygon points="425,140 415,135 415,145" class="fa"/>

  <!-- Step 4: Vector DB -->
  <rect x="425" y="100" width="115" height="80" rx="4" class="s"/>
  <text x="483" y="124" text-anchor="middle" class="acc">04 · STORE</text>
  <text x="483" y="146" text-anchor="middle" class="text">vector</text>
  <text x="483" y="162" text-anchor="middle" class="text">database</text>

  <!-- "Per question" header bar -->
  <rect x="560" y="64" width="220" height="22" rx="3" class="a"/>
  <rect x="560" y="64" width="220" height="22" rx="3" class="fs" opacity="0.5"/>
  <rect x="560" y="64" width="220" height="22" rx="3" class="a" fill="none"/>
  <text x="670" y="80" text-anchor="middle" class="acc">PER QUESTION (EVERY TIME)</text>

  <!-- Step 5: Big box on the right -->
  <rect x="560" y="100" width="220" height="80" rx="4" class="fs"/>
  <rect x="560" y="100" width="220" height="80" rx="4" class="a"/>
  <text x="670" y="124" text-anchor="middle" class="acc">05 · ASK</text>
  <text x="670" y="146" text-anchor="middle" class="text">find similar chunks +</text>
  <text x="670" y="162" text-anchor="middle" class="text">send to model → answer</text>

  <!-- Connector from step 4 to step 5 -->
  <line x1="540" y1="140" x2="560" y2="140" class="sm"/>

  <!-- Worked example -->
  <line x1="40" y1="210" x2="760" y2="210" class="sm"/>
  <text x="40" y="234" class="acc">WORKED EXAMPLE · ONLINE SHOP FAQ</text>

  <text x="40" y="258" class="label">USER ASKS:</text>
  <text x="160" y="258" class="text">"How long do I have to return something?"</text>

  <text x="40" y="280" class="label">STEP 5 FINDS:</text>
  <text x="160" y="280" class="text">chunk about returns (30 days, unused, original packaging)</text>

  <text x="40" y="302" class="label">MODEL GETS:</text>
  <text x="160" y="302" class="text">the question + the chunk, told to answer from the chunk only</text>

  <text x="40" y="324" class="acc">MODEL ANSWERS:</text>
  <text x="160" y="324" class="text">"30 days from purchase, item must be unused, in original packaging."</text>

  <text x="400" y="350" text-anchor="middle" class="label">NO HALLUCINATION · ANSWER COMES FROM YOUR DOCUMENT</text>
</svg>
