<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-mcp-vs-rest">
  <title id="t-mcp-vs-rest">REST endpoint caller vs MCP tool caller — different audiences, different contracts</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">SAME ENDPOINT · DIFFERENT CALLER · DIFFERENT CONTRACT</text>

  <!-- REST API row -->
  <text x="40" y="74" class="acc">REST API · CALLER IS A PROGRAMMER</text>
  <rect x="40" y="86" width="160" height="76" rx="4" class="s"/>
  <text x="120" y="112" text-anchor="middle" class="mono">developer</text>
  <text x="120" y="132" text-anchor="middle" class="label">READS DOCS</text>
  <text x="120" y="148" text-anchor="middle" class="label">SHIPS A FIX</text>

  <line x1="200" y1="124" x2="260" y2="124" class="a"/>
  <polygon points="260,124 250,119 250,129" class="fa"/>

  <rect x="260" y="86" width="160" height="76" rx="4" class="s"/>
  <text x="340" y="112" text-anchor="middle" class="mono">POST /invoices</text>
  <text x="340" y="132" text-anchor="middle" class="label">JSON IN · JSON OUT</text>
  <text x="340" y="148" text-anchor="middle" class="label">STATUS CODES</text>

  <text x="450" y="106" class="text">Renames break the build —</text>
  <text x="450" y="124" class="text">caller updates the code</text>
  <text x="450" y="142" class="text">and ships a new version.</text>
  <text x="450" y="158" class="label">DELIBERATE · ACCOUNTABLE</text>

  <line x1="40" y1="186" x2="760" y2="186" class="sm"/>

  <!-- MCP row -->
  <text x="40" y="214" class="acc">MCP TOOL · CALLER IS A MODEL</text>
  <rect x="40" y="226" width="160" height="76" rx="4" class="s"/>
  <text x="120" y="252" text-anchor="middle" class="mono">model</text>
  <text x="120" y="272" text-anchor="middle" class="label">READS DESCRIPTION</text>
  <text x="120" y="288" text-anchor="middle" class="label">PICKS BY NAME</text>

  <line x1="200" y1="264" x2="260" y2="264" class="a"/>
  <polygon points="260,264 250,259 250,269" class="fa"/>

  <rect x="260" y="226" width="160" height="76" rx="4" class="s"/>
  <text x="340" y="252" text-anchor="middle" class="mono">search_invoices</text>
  <text x="340" y="272" text-anchor="middle" class="label">PARAMS + DESCRIPTION</text>
  <text x="340" y="288" text-anchor="middle" class="label">NATURAL-LANG RESULT</text>

  <text x="450" y="246" class="danger">Renames silently disappear.</text>
  <text x="450" y="264" class="text">Vague descriptions → wrong tool.</text>
  <text x="450" y="282" class="text">Big payloads blow context.</text>
  <text x="450" y="298" class="label">NON-DETERMINISTIC · NO RETRY KNOWLEDGE</text>

  <text x="400" y="338" text-anchor="middle" class="label">YOUR REST API IS NOT YOUR MCP SERVER · DESIGN A NEW SURFACE</text>
</svg>
