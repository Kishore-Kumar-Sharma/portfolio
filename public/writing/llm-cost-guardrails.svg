<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-llm-guard">
  <title id="t-llm-guard">Three cost guardrails for an LLM gateway</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">THE BILL THAT SURPRISES YOU · PREVENTED BY THREE CHEAP CONFIGS</text>

  <!-- Guard 1: Daily budget -->
  <rect x="40" y="64" width="230" height="200" rx="4" class="s"/>
  <text x="60" y="92" class="acc">01 · DAILY BUDGET</text>
  <text x="60" y="112" class="label">PER CAPABILITY · IN USD</text>
  <line x1="60" y1="124" x2="250" y2="124" class="sm"/>
  <text x="60" y="148" class="mono">summarize_doc:</text>
  <text x="60" y="166" class="mono">  daily_max: $40</text>
  <text x="60" y="190" class="text">Redis-tracked spend.</text>
  <text x="60" y="208" class="text">Capability returns 503,</text>
  <text x="60" y="226" class="text">Slack alert fires.</text>
  <text x="60" y="252" class="danger">STOPS THE LOOPING-PROMPT</text>

  <!-- Guard 2: Token cap -->
  <rect x="285" y="64" width="230" height="200" rx="4" class="s"/>
  <text x="305" y="92" class="acc">02 · TOKEN CAP</text>
  <text x="305" y="112" class="label">HARD MAX_TOKENS PER CALL</text>
  <line x1="305" y1="124" x2="495" y2="124" class="sm"/>
  <text x="305" y="148" class="mono">max_tokens: 600</text>
  <text x="305" y="166" class="mono">(typical: 200)</text>
  <text x="305" y="190" class="text">Set well above the</text>
  <text x="305" y="208" class="text">typical response, well</text>
  <text x="305" y="226" class="text">below the worst case.</text>
  <text x="305" y="252" class="danger">STOPS THE RAMBLING-MODEL</text>

  <!-- Guard 3: Per-tenant limit -->
  <rect x="530" y="64" width="230" height="200" rx="4" class="s"/>
  <text x="550" y="92" class="acc">03 · PER-TENANT RATE</text>
  <text x="550" y="112" class="label">YOUR LIMIT · NOT PROVIDER'S</text>
  <line x1="550" y1="124" x2="740" y2="124" class="sm"/>
  <text x="550" y="148" class="mono">tenant_qps: 5</text>
  <text x="550" y="166" class="mono">(org quota: 200)</text>
  <text x="550" y="190" class="text">A misbehaving caller</text>
  <text x="550" y="208" class="text">can't burn the entire</text>
  <text x="550" y="226" class="text">org's quota in five min.</text>
  <text x="550" y="252" class="danger">STOPS THE NOISY-NEIGHBOUR</text>

  <text x="400" y="306" text-anchor="middle" class="label">THE FIRST INCIDENT IS EXPENSIVE · THE DESIGN PREVENTS THE SECOND</text>
</svg>
