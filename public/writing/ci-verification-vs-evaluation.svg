<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-ci-vve">
  <title id="t-ci-vve">Verification vs evaluation: two questions, two test layers</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">TWO QUESTIONS · BOTH MATTER · ONLY ONE WAS AUTOMATED BEFORE AGENTS</text>

  <!-- Verification card -->
  <rect x="40" y="64" width="350" height="240" rx="4" class="s"/>
  <text x="60" y="92" class="acc">VERIFICATION</text>
  <text x="60" y="112" class="label">DOES IT BEHAVE AS SPECIFIED?</text>
  <line x1="60" y1="124" x2="370" y2="124" class="sm"/>

  <text x="60" y="148" class="text">· lint</text>
  <text x="60" y="166" class="text">· type check</text>
  <text x="60" y="184" class="text">· unit tests</text>
  <text x="60" y="202" class="text">· integration tests</text>

  <line x1="60" y1="218" x2="370" y2="218" class="sm"/>

  <text x="60" y="240" class="label">CATCHES</text>
  <text x="60" y="258" class="text">incorrect logic exercised by a test</text>

  <text x="60" y="282" class="danger">MISSES</text>
  <text x="60" y="300" class="text">code that's wrong but never tested for it</text>

  <!-- Evaluation card -->
  <rect x="410" y="64" width="350" height="240" rx="4" class="fs"/>
  <rect x="410" y="64" width="350" height="240" rx="4" class="a"/>
  <text x="430" y="92" class="acc">EVALUATION</text>
  <text x="430" y="112" class="label">IS THIS THE RIGHT CODE TO HAVE WRITTEN?</text>
  <line x1="430" y1="124" x2="740" y2="124" class="sm"/>

  <text x="430" y="148" class="text">· duplication scan</text>
  <text x="430" y="166" class="text">· security pattern check</text>
  <text x="430" y="184" class="text">· convention lints</text>
  <text x="430" y="202" class="text">· diff-scope-vs-description</text>

  <line x1="430" y1="218" x2="740" y2="218" class="sm"/>

  <text x="430" y="240" class="label">CATCHES</text>
  <text x="430" y="258" class="text">tests that agree with implementation</text>

  <text x="430" y="282" class="acc">DELTA</text>
  <text x="430" y="300" class="text">silent-bug class that compiles + passes</text>
</svg>
