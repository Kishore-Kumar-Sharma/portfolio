<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-rag-chunk">
  <title id="t-rag-chunk">Naive size-based chunking vs structure-aware chunking</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">SAME DOC · TWO CHUNKING STRATEGIES · DIFFERENT RETRIEVAL OUTCOMES</text>

  <!-- LEFT: naive size-based -->
  <text x="200" y="74" text-anchor="middle" class="danger">NAIVE · 500-TOKEN SPLIT</text>

  <rect x="40" y="86" width="320" height="200" rx="4" class="s"/>
  <text x="60" y="112" class="label">## DATABASE LIMITS</text>
  <text x="60" y="132" class="text">The system fails when</text>
  <text x="60" y="150" class="text">concurrent writes exceed</text>
  <line x1="40" y1="160" x2="360" y2="160" class="dg" stroke-dasharray="6 4"/>
  <text x="60" y="180" class="text">the queue depth limit.</text>
  <text x="60" y="200" class="text">## SCALING</text>
  <text x="60" y="218" class="text">It requires a separate</text>
  <line x1="40" y1="228" x2="360" y2="228" class="dg" stroke-dasharray="6 4"/>
  <text x="60" y="248" class="text">IAM role and a new</text>
  <text x="60" y="266" class="text">deployment template.</text>

  <text x="60" y="306" class="danger">SPLIT MID-SENTENCE</text>
  <text x="60" y="322" class="text">"the system fails when</text>
  <text x="60" y="340" class="text">concurrent writes exceed"</text>
  <text x="60" y="356" class="danger">→ EMBEDDING MISSES THE QUERY</text>

  <!-- RIGHT: structure-aware -->
  <text x="600" y="74" text-anchor="middle" class="acc">STRUCTURE-AWARE</text>

  <rect x="440" y="86" width="320" height="92" rx="4" class="fs"/>
  <rect x="440" y="86" width="320" height="92" rx="4" class="a"/>
  <text x="460" y="112" class="acc">CHUNK A · ## DATABASE LIMITS</text>
  <text x="460" y="132" class="text">The system fails when concurrent</text>
  <text x="460" y="150" class="text">writes exceed the queue depth limit.</text>
  <text x="460" y="170" class="label">META: heading=database, section=2</text>

  <rect x="440" y="190" width="320" height="92" rx="4" class="fs"/>
  <rect x="440" y="190" width="320" height="92" rx="4" class="a"/>
  <text x="460" y="216" class="acc">CHUNK B · ## SCALING</text>
  <text x="460" y="236" class="text">It requires a separate IAM role and</text>
  <text x="460" y="254" class="text">a new deployment template.</text>
  <text x="460" y="274" class="label">META: heading=scaling, section=3</text>

  <text x="460" y="306" class="acc">SPLIT ON HEADINGS</text>
  <text x="460" y="322" class="text">Each chunk = one coherent idea.</text>
  <text x="460" y="340" class="text">Small chunk indexed, larger window</text>
  <text x="460" y="358" class="text">fed to the model at generation time.</text>
</svg>
