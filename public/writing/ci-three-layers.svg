<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-ci-three">
  <title id="t-ci-three">CI in three layers: per-PR fast, per-PR evaluation, nightly deep</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">SPLIT BY CADENCE · PUT SLOW THINGS ON THE NIGHTLY · DON'T BLOCK REVIEW</text>

  <!-- Layer 1: Per-PR fast verification -->
  <rect x="40" y="64" width="720" height="80" rx="4" class="s"/>
  <text x="60" y="92" class="acc">LAYER 01 · PER-PR VERIFICATION · <tspan class="label">&lt; 10 MIN · BLOCKS MERGE</tspan></text>
  <line x1="60" y1="104" x2="740" y2="104" class="sm"/>
  <text x="60" y="124" class="text">lint · type · unit · integration against ephemeral env</text>
  <text x="60" y="140" class="label">THE STANDARD STUFF · MUST STAY FAST</text>

  <!-- Layer 2: Per-PR evaluation -->
  <rect x="40" y="158" width="720" height="80" rx="4" class="fs"/>
  <rect x="40" y="158" width="720" height="80" rx="4" class="a"/>
  <text x="60" y="186" class="acc">LAYER 02 · PER-PR EVALUATION · <tspan class="label">&lt; 5 MIN · MOSTLY ADVISORY</tspan></text>
  <line x1="60" y1="198" x2="740" y2="198" class="sm"/>
  <text x="60" y="218" class="text">duplication · security pattern · convention lint · scope-vs-description</text>
  <text x="60" y="234" class="acc">HARD FAILURES BLOCK · SOFT FINDINGS POST ONE AGGREGATED COMMENT</text>

  <!-- Layer 3: Nightly evaluation -->
  <rect x="40" y="252" width="720" height="80" rx="4" class="s"/>
  <text x="60" y="280" class="acc">LAYER 03 · NIGHTLY EVALUATION · <tspan class="label">SLOW · DASHBOARD · DOESN'T BLOCK</tspan></text>
  <line x1="60" y1="292" x2="740" y2="292" class="sm"/>
  <text x="60" y="312" class="text">mutation testing · dependency drift · cross-codebase pattern surveys</text>
  <text x="60" y="328" class="label">HOW YOU NOTICE WEEKS-OLD DRIFT BEFORE IT BECOMES A REWRITE</text>

  <text x="400" y="364" text-anchor="middle" class="label">PUT SLOW CHECKS IN PER-PR → INTOLERABLE · SKIP THEM → SILENT DECAY</text>
</svg>
