<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-llm-gateway">
  <title id="t-llm-gateway">LLM gateway: one endpoint per capability fronting many providers</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">CAPABILITIES → GATEWAY → PROVIDERS · NO DIRECT SDK CALLS</text>

  <!-- Callers -->
  <text x="120" y="74" text-anchor="middle" class="label">CALLERS</text>
  <rect x="40" y="86" width="160" height="40" rx="4" class="s"/>
  <text x="120" y="110" text-anchor="middle" class="mono">billing-service</text>
  <rect x="40" y="136" width="160" height="40" rx="4" class="s"/>
  <text x="120" y="160" text-anchor="middle" class="mono">support-bot</text>
  <rect x="40" y="186" width="160" height="40" rx="4" class="s"/>
  <text x="120" y="210" text-anchor="middle" class="mono">analytics-job</text>

  <!-- Arrows in -->
  <line x1="200" y1="106" x2="280" y2="156" class="a"/>
  <polygon points="280,156 269,154 273,164" class="fa"/>
  <line x1="200" y1="156" x2="280" y2="170" class="a"/>
  <polygon points="280,170 270,165 270,175" class="fa"/>
  <line x1="200" y1="206" x2="280" y2="184" class="a"/>
  <polygon points="280,184 270,182 271,192" class="fa"/>

  <!-- Gateway -->
  <rect x="280" y="86" width="240" height="180" rx="4" class="fs"/>
  <rect x="280" y="86" width="240" height="180" rx="4" class="a"/>
  <text x="400" y="112" text-anchor="middle" class="acc">LLM GATEWAY</text>
  <line x1="300" y1="124" x2="500" y2="124" class="sm"/>
  <text x="300" y="148" class="text">POST /complete</text>
  <text x="300" y="168" class="text">POST /embed</text>
  <text x="300" y="188" class="text">POST /extract</text>
  <line x1="300" y1="204" x2="500" y2="204" class="sm"/>
  <text x="300" y="224" class="label">ROUTING · RETRIES · CACHE</text>
  <text x="300" y="242" class="label">PROMPTS · BUDGETS · METRICS</text>
  <text x="300" y="260" class="label">TRACING · CIRCUIT BREAKERS</text>

  <!-- Arrows out -->
  <line x1="520" y1="130" x2="600" y2="106" class="a"/>
  <polygon points="600,106 590,105 591,115" class="fa"/>
  <line x1="520" y1="176" x2="600" y2="156" class="a"/>
  <polygon points="600,156 590,154 591,164" class="fa"/>
  <line x1="520" y1="220" x2="600" y2="206" class="a"/>
  <polygon points="600,206 590,202 591,212" class="fa"/>
  <line x1="520" y1="248" x2="600" y2="256" class="dg" stroke-dasharray="4 3"/>
  <polygon points="600,256 591,251 590,260" class="fd"/>

  <!-- Providers -->
  <text x="680" y="74" text-anchor="middle" class="label">PROVIDERS</text>
  <rect x="600" y="86" width="160" height="40" rx="4" class="s"/>
  <text x="680" y="110" text-anchor="middle" class="mono">openai</text>
  <rect x="600" y="136" width="160" height="40" rx="4" class="s"/>
  <text x="680" y="160" text-anchor="middle" class="mono">anthropic</text>
  <rect x="600" y="186" width="160" height="40" rx="4" class="s"/>
  <text x="680" y="210" text-anchor="middle" class="mono">bedrock</text>
  <rect x="600" y="236" width="160" height="40" rx="4" class="s"/>
  <text x="680" y="252" text-anchor="middle" class="danger">DEGRADED</text>
  <text x="680" y="268" text-anchor="middle" class="label">VERTEX (FAILOVER)</text>

  <text x="400" y="316" text-anchor="middle" class="label">ONE PROVIDER OUTAGE · ONE TEAM FAILS OVER · EVERYONE ELSE KEEPS SHIPPING</text>
</svg>
