<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-mcp-shape">
  <title id="t-mcp-shape">What an MCP server exposes: tools, resources, prompts</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">MCP SERVER · THREE THINGS YOU EXPOSE</text>

  <!-- Tools -->
  <rect x="40" y="64" width="230" height="180" rx="4" class="s"/>
  <text x="60" y="92" class="acc">TOOLS</text>
  <text x="60" y="112" class="label">ACTIONS THE AGENT CAN INVOKE</text>
  <line x1="60" y1="124" x2="250" y2="124" class="sm"/>
  <text x="60" y="148" class="mono">search_invoices(...)</text>
  <text x="60" y="168" class="mono">cancel_subscription(id)</text>
  <text x="60" y="188" class="mono">send_email(to, body)</text>
  <line x1="60" y1="204" x2="250" y2="204" class="sm"/>
  <text x="60" y="224" class="text">PARAMETERS · RESULT</text>
  <text x="60" y="240" class="text">MAY HAVE SIDE EFFECTS</text>

  <!-- Resources -->
  <rect x="285" y="64" width="230" height="180" rx="4" class="s"/>
  <text x="305" y="92" class="acc">RESOURCES</text>
  <text x="305" y="112" class="label">CONTEXT THE AGENT CAN READ</text>
  <line x1="305" y1="124" x2="495" y2="124" class="sm"/>
  <text x="305" y="148" class="mono">postgres://schema/orders</text>
  <text x="305" y="168" class="mono">runbook://incidents/p1</text>
  <text x="305" y="188" class="mono">customer://acct-9931</text>
  <line x1="305" y1="204" x2="495" y2="204" class="sm"/>
  <text x="305" y="224" class="text">ADDRESSABLE · LISTABLE</text>
  <text x="305" y="240" class="text">NO PARAMETERS · READ ONLY</text>

  <!-- Prompts -->
  <rect x="530" y="64" width="230" height="180" rx="4" class="s"/>
  <text x="550" y="92" class="acc">PROMPTS</text>
  <text x="550" y="112" class="label">WORKFLOWS THE USER PICKS</text>
  <line x1="550" y1="124" x2="740" y2="124" class="sm"/>
  <text x="550" y="148" class="mono">/summarize_incident</text>
  <text x="550" y="168" class="mono">/triage_alert</text>
  <text x="550" y="188" class="mono">/release_notes</text>
  <line x1="550" y1="204" x2="740" y2="204" class="sm"/>
  <text x="550" y="224" class="text">SLASH-COMMAND SHAPE</text>
  <text x="550" y="240" class="text">USER-INVOKED · PARAMETERIZED</text>

  <text x="400" y="290" text-anchor="middle" class="label">AGENT DECIDES → TOOL · AGENT LOOKS UP → RESOURCE · USER INVOKES → PROMPT</text>
</svg>
